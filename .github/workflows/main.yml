name: CI-NodeJsNeeds
on:
    workflow_dispatch:
jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v6
            - name: Set up Node.js 18
              uses: actions/setup-node@v3
              with:
                node-version: 18
                cache: 'npm'
    job2:
        needs: job1
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v6
            - name: Set up Node.js 18
              uses: actions/setup-node@v3
              with:
                node-version: 18
                cache: 'npm'
            - name: Install dependencies
              run: npm ci
            - name: Run tests
              run: npm test
            - name: Build the code
              run: npm run build
            - name: Deploy the code
              run: echo "Deploying the code..."
