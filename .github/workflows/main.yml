name: Self-Hosted Runner Workflow
on:
    push:
jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v6
            - name: set up node
              uses: actions/setup-node@v3
              with:
                node-version: 18
                cache: 'npm'
            - name: install dependencies
              run: npm ci
    job2:
        runs-on: self-hosted
        steps:
            - name: checkout code
              uses: actions/checkout@v6
            - name: set up node
              uses: actions/setup-node@v3
              with:
                node-version: 18
                cache: 'npm'
            - name: install dependencies
              run: npm ci
